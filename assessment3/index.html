<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geometric Rush: Dark Neon</title>
    <link rel="stylesheet" href="reset.css">
    <style>
        /* ==========================================
           CSS 样式设计 (Style & Affective Design)
           ========================================== */
        body {
            background-color: #0d0d13;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        /* 游戏主容器 */
        #game-container {
            width: 360px;
            height: 600px;
            background-color: #12121a;
            position: relative;
            overflow: hidden;
            border: 3px solid #333;
            border-radius: 12px;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.7);
        }

        /* 霓虹赛道 */
        .lane-line {
            position: absolute;
            top: 0;
            bottom: 0;
            width: 2px;
            background: linear-gradient(to bottom, #00f2fe, #4facfe);
            box-shadow: 0 0 12px #00f2fe;
            opacity: 0.4;
        }
        #line-left { left: 120px; }
        #line-right { left: 240px; }

        /* 玩家角色：左右移动通过 transition 保持丝滑手感 (Usability) */
        #player {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #f857a6, #ff5858);
            box-shadow: 0 0 20px #f857a6;
            position: absolute;
            bottom: 40px;
            left: 35px; /* 初始左赛道位置: (120/2) - (50/2) */
            border-radius: 8px;
            transition: left 0.12s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        /* 玩家移动时的微流动效反馈 (Feedback) */
        #player.move-streak {
            transform: scaleX(0.8) scaleY(1.1);
        }

        /* 障碍物样式 */
        .obstacle {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #ff9900, #ff5b00);
            box-shadow: 0 0 15px #ff9900;
            position: absolute;
            top: -60px;
            border-radius: 4px;
        }

        /* 游戏UI面板 */
        #ui-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            font-size: 18px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-shadow: 0 0 8px rgba(255,255,255,0.5);
            z-index: 10;
        }

        #score-display { color: #00f2fe; }
        #speed-display { color: #ff9900; }

        /* 结束和开始界面遮罩 */
        .screen-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: rgba(13, 13, 19, 0.95);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            text-align: center;
            padding: 20px;
        }

        .screen-overlay h1 {
            font-size: 28px;
            margin-bottom: 10px;
            color: #f857a6;
            text-shadow: 0 0 15px #f857a6;
        }

        .screen-overlay p {
            font-size: 14px;
            color: #aaa;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .start-btn {
            background: linear-gradient(135deg, #00f2fe, #4facfe);
            color: #fff;
            border: none;
            padding: 12px 35px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 0 15px #00f2fe;
            transition: transform 0.2s;
        }

        .start-btn:hover {
            transform: scale(1.05);
        }

        .hidden { display: none !important; }
        /* 让障碍物从屏幕上方掉落到下方的核心动画 */
@keyframes fall {
    0% {
        top: -60px;
    }
    100% {
        top: 600px; /* 对应游戏容器的 height: 600px */
    }
}
    </style>
</head>
<body>

    <div id="game-container">
        <div id="ui-panel">
            <div id="score-display">Score: 0</div>
            <div id="speed-display">Speed: 1x</div>
        </div>

        <div id="line-left" class="lane-line"></div>
        <div id="line-right" class="lane-line"></div>

        <div id="player"></div>

        <div id="start-screen" class="screen-overlay">
            <h1>GEOMETRIC RUSH</h1>
            <p>使用键盘 [ ← ] 和 [ → ] 键改变赛道<br>躲避迎面而来的橙色障碍物</p>
            <button class="start-btn" onclick="startGame()">START INTERACTION</button>
        </div>

        <div id="gameover-screen" class="screen-overlay hidden">
            <h1>CRASH DETECTED</h1>
            <p id="final-score">Your Score: 0</p>
            <button class="start-btn" onclick="startGame()">TRY AGAIN</button>
        </div>
    </div>

    <script>
        /* ================================================================================
        RMIT INTERACTIVE MEDIA - ASSIGNMENT 3 - CODE COMMENTS & DESIGN INTENT (512 WORDS)
        ================================================================================
        [CONTEXT INFLUENCE & AFFECTIVE DESIGN]
        The selected context for this prototype is an experimental cyber-minimalist arcade interaction titled 
        "Geometric Rush: Dark Neon". This context directly dictates the visual styling, aesthetic choices, and 
        emotional response (affective design). To evoke a sense of high-velocity tension inherent in arcade systems, 
        a high-contrast dark palette (#0d0d13) is combined with vibrant, glowing neon elements. The sharp geometric 
        forms—a glowing magenta square for the user and intense orange rectangles for obstacles—create immediate 
        cognitive separation. This stylistic minimalism ensures that the user is not distracted by secondary background 
        assets, channelling entire cognitive focus toward the core mechanics of the interactive space.

        [ACTION, USABILITY, AND INTERACTION FEEDBACK]
        The primary core action implemented is [Navigate], map-assigned to the standard physical keyboard hardware 
        via 'ArrowLeft' and 'ArrowRight' keys. Usability is prioritized by dividing the canvas into three distinct, 
        predictable lanes. This constrained spatial environment prevents user frustration commonly caused by loose, 
        unbounded tracking. The physical transition of the player across lanes employs a custom CSS cubic-bezier 
        curve animation lasting exactly 0.12 seconds. This specific timing balances structural responsiveness (immediate 
        execution) with visual continuity (preventing harsh positional snapping). To enrich interactive feedback, a 
        temporary squash-and-stretch transformation matrix (.move-streak) is applied via JavaScript upon key detection, 
        simulating kinetic inertia and providing a tactile, juicy movement feel. Score increments act as a continuous 
        reward schedule, reinforcing survival behavior.

        [COMPLEXITY, DIFFICULTY SCALING, AND ACCESSIBILITY]
        Usability is further engineered through an incremental difficulty loop managed via a core ticker. As time 
        progresses, the generation window for obstacles dynamically shrinks, and the vertical pixel displacement 
        speed steps up, increasing cognitive load. This directly addresses the flow state, transitioning the user 
        from relaxed onboarding to intense engagement. Collision detection runs via an absolute coordinate bounding-box 
        algorithm (getBoundingClientRect), cross-referencing intersections to trigger the immediate termination of the loop.

        [FUTURE IMPLEMENTATION: BENEFITS & CHALLENGES]
        Integrating this standalone interaction prototype into a broader, production-level digital media framework offers 
        significant scalable benefits but poses architectural challenges. 
        Benefits: The modular architecture—strict separation between core rendering, physics loops, and state modifiers—allows 
        this interaction to easily serve as an immersive loading screen mini-game, an interactive banner for marketing 
        portfolios, or a foundation for a larger mobile web-app game.
        Challenges: The current iteration relies heavily on fixed pixel layouts (360px by 600px) and global procedural state 
        loops. Scaling this into a commercial ecosystem would demand complete responsive refactoring (using relative viewport units), 
        transitioning to object-oriented structures (OOP) to handle multiple obstacle arrays, and optimizing DOM manipulation 
        via an HTML5 Canvas to prevent performance bottlenecks on low-tier mobile viewports.
        
        [ATTRIBUTION]
        Code Design: Handcrafted entirely by the student researcher. No external JS/CSS frameworks utilized.
        Reset Architecture: Standard reset.css template provided via RMIT Interactive Media course canvas.
        ================================================================================
        */

        // 游戏状态变量
        let score = 0;
        let currentLane = 1; // 0: 左, 1: 中, 2: 右
        let gameActive = false;
        let obstacleSpeed = 4; // 障碍物落下一程所需的初始时间（秒）
        let spawnRate = 1200; // 初始每 1.2 秒生成一个障碍物
        let gameLoopInterval;
        let difficultyInterval;
        let obstacles = [];

        // 赛道对应的绝对 X 轴左边距 (px)
        const lanePositions = [35, 155, 275]; 

        const player = document.getElementById('player');
        const container = document.getElementById('game-container');
        const scoreDisplay = document.getElementById('score-display');
        const speedDisplay = document.getElementById('speed-display');
        const startScreen = document.getElementById('start-screen');
        const gameoverScreen = document.getElementById('gameover-screen');
        const finalScore = document.getElementById('final-score');

        // 核心动作 [Navigate]: 键盘事件监听
        document.addEventListener('keydown', function(e) {
            if (!gameActive) return;

            if (e.key === 'ArrowLeft' && currentLane > 0) {
                currentLane--;
                triggerMoveEffect();
            } else if (e.key === 'ArrowRight' && currentLane < 2) {
                currentLane++;
                triggerMoveEffect();
            }
            // 更新玩家位置
            player.style.left = lanePositions[currentLane] + 'px';
        });

        // 互动反馈：角色移动时添加微变形动效
        function triggerMoveEffect() {
            player.classList.add('move-streak');
            setTimeout(() => {
                player.classList.remove('move-streak');
            }, 120);
        }

        // 开始/重置互动
        function startGame() {
            // 清理旧障碍物
            obstacles.forEach(obs => obs.remove());
            obstacles = [];
            
            // 重置状态
            score = 0;
            currentLane = 1;
            obstacleSpeed = 4;
            spawnRate = 1200;
            gameActive = true;
            
            player.style.left = lanePositions[currentLane] + 'px';
            scoreDisplay.innerText = "Score: " + score;
            speedDisplay.innerText = "Speed: 1x";

            // 隐藏遮罩界面
            startScreen.classList.add('hidden');
            gameoverScreen.classList.add('hidden');

            // 启动核心循环
            runGameLoop();
            
            // 难度随时间递增控制
            difficultyInterval = setInterval(() => {
                if (obstacleSpeed > 1.5) {
                    obstacleSpeed -= 0.25; // 掉落变快
                    spawnRate = Math.max(500, spawnRate - 80); // 生成变密集
                    
                    // 更新速度UI显示
                    let multiplier = (4 / obstacleSpeed).toFixed(1);
                    speedDisplay.innerText = "Speed: " + multiplier + "x";
                    
                    // 重启循环应用新速度
                    clearInterval(gameLoopInterval);
                    runGameLoop();
                }
            }, 4000); // 每 4 秒自动变难
        }

        function runGameLoop() {
            gameLoopInterval = setInterval(() => {
                createObstacle();
            }, spawnRate);
        }

        // 动态创建障碍物元素
        function createObstacle() {
            const obs = document.createElement('div');
            obs.classList.add('obstacle');
            
            // 随机选择一条赛道生成
            const randomLane = Math.floor(Math.random() * 3);
            obs.style.left = lanePositions[randomLane] + 'px';
            obs.style.top = '-60px';
            
            // 使用原生 CSS 动画控制下落速度
            obs.style.animate = 'none'; 
            obs.style.animation = `fall ${obstacleSpeed}s linear forwards`;
            
            container.appendChild(obs);
            obstacles.push(obs);

            // 当障碍物动画结束（移出屏幕）时安全移除
            obs.addEventListener('animationend', () => {
                obs.remove();
                obstacles = obstacles.filter(item => item !== obs);
                if (gameActive) {
                    score += 10; // 成功躲避得分反馈
                    scoreDisplay.innerText = "Score: " + score;
                }
            });
        }

        // 碰撞检测循环 (每 16ms 运行一次，达到 60fps 级别的 Usability 体验)
        function updatePhysics() {
            if (gameActive && obstacles.length > 0) {
                const playerRect = player.getBoundingClientRect();

                for (let i = 0; i < obstacles.length; i++) {
                    const obsRect = obstacles[i].getBoundingClientRect();

                    // AABB 边缘碰撞算法
                    if (!(playerRect.right < obsRect.left || 
                          playerRect.left > obsRect.right || 
                          playerRect.bottom < obsRect.top || 
                          playerRect.top > obsRect.bottom)) {
                        gameOver();
                        break;
                    }
                }
            }
            requestAnimationFrame(updatePhysics);
        }
        // 启动碰撞监听
        requestAnimationFrame(updatePhysics);

        // 结束互动
        function gameOver() {
            gameActive = false;
            clearInterval(gameLoopInterval);
            clearInterval(difficultyInterval);
            
            finalScore.innerText = "Your Score: " + score;
            gameoverScreen.classList.remove('hidden');
        }
    </script>
</body>
</html>
