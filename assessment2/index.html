<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media Player Website</title>
    <link rel="stylesheet" href="reset.css">
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>
    <header><h1>Media Player Website</h1></header>
    <nav>
        <ul>
            <li><a href="#">Home</a></li>
            <li><a href="#">Videos</a></li>
            <li><a href="#">Music</a></li>
            <li><a href="#">Playlists</a></li>
        </ul>
    </nav>
    <main class="container">
        <div class="video-wrapper" id="player-box">
            <video id="main-video">
                <source src="https://thelongesthumstore.sgp1.cdn.digitaloceanspaces.com/IM-2250/miac.mp4" type="video/mp4">
            </video>

            <div id="quality-menu" class="hidden">
                <ul>
                    <li onclick="changeQ('1080p')">1080p</li>
                    <li onclick="changeQ('720p')">720p</li>
                </ul>
            </div>

            <div class="yt-controls">
                <div class="progress-area" id="scrub-container">
                    <div class="progress-rail"><div id="progress-fill"></div></div>
                </div>
                <div class="control-row">
                    <div class="left">
                        <button onclick="togglePlay()" class="btn"><img id="p-img" src="https://img.icons8.com/ios-glyphs/30/ffffff/play--v1.png" width="20"></button>
                        <div class="vol-zone">
                            <button onclick="toggleMute()" class="btn"><img id="m-img" src="https://img.icons8.com/ios-glyphs/30/ffffff/high-volume--v1.png" width="18"></button>
                            <input type="range" id="vol-slider" min="0" max="1" step="0.05" value="1">
                        </div>
                    </div>
                    <div class="right">
                        <button onclick="toggleS()" class="btn"><img src="https://img.icons8.com/ios-glyphs/30/ffffff/settings.png" width="18"></button>
                        <button onclick="toggleF()" class="btn"><img src="https://img.icons8.com/ios-glyphs/30/ffffff/full-screen.png" width="18"></button>
                    </div>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
