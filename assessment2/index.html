<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Music Video Player - Interactive Media</title>
    <link rel="stylesheet" href="reset.css" />
    <link rel="stylesheet" href="style.css" />
    <script src="script.js" defer></script>
  </head>
  <body>
    <header>
      <h1>SonicVibe MV Player</h1>
    </header>

    <nav>
      <ul>
        <li><a href="#">Home</a></li>
        <li><a href="#">Videos</a></li>
        <li><a href="#">Music</a></li>
        <li><a href="#">Playlists</a></li>
      </ul>
    </nav>

    <main class="container">
      <div class="media-player" id="video-container">
        <video id="custom-video-player">
          <source
            src="https://thelongesthumstore.sgp1.cdn.digitaloceanspaces.com/IM-2250/miac.mp4"
            type="video/mp4"
          />
        </video>

        <div class="custom-controls">
          <button id="play-pause-btn" onclick="togglePlayPause()">
            <img
              id="play-pause-img"
              src="https://img.icons8.com/ios-glyphs/30/play--v1.png"
              alt="Play"
              width="24"
              height="24"
            />
          </button>

          <div class="progress-bar" id="progress-container">
            <span id="progress-bar-fill"></span>
          </div>

          <button id="mute-btn" onclick="toggleMute()">
            <img
              id="mute-img"
              src="https://img.icons8.com/ios-glyphs/30/high-volume--v1.png"
              alt="Mute"
              width="24"
              height="24"
            />
          </button>
        </div>
      </div>

      <section class="extra-features">
        <h2>Interactive Features</h2>
        <p>Enhance your visual experience with our custom effects.</p>
        
        <button id="neon-mode-btn" onclick="toggleNeonMode()">
          ✨ Toggle Neon Ambient
        </button>
      </section>
    </main>

    <footer>
      <p>&copy; 2026 OART1013 Semester 1. All rights reserved.</p>
    </footer>
  </body>
</html>
